<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b2d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3b66;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:0" />
      <stop offset="15%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#50e6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50e6ff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4" />
      <stop offset="100%" style="stop-color:#005a9e" />
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4" />
      <stop offset="100%" style="stop-color:#50e6ff" />
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50e6ff" />
      <stop offset="100%" style="stop-color:#00b7c3" />
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b7c3" />
      <stop offset="100%" style="stop-color:#008272" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Grid pattern for tech feel -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <!-- Dot pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#50e6ff" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" rx="12" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" rx="12" fill="url(#grid)"/>
  <rect width="1200" height="320" rx="12" fill="url(#dots)"/>

  <!-- Decorative circles (subtle tech aesthetic) -->
  <circle cx="100" cy="280" r="180" fill="#0078D4" opacity="0.03"/>
  <circle cx="1100" cy="40" r="200" fill="#50e6ff" opacity="0.03"/>
  <circle cx="600" cy="160" r="300" fill="#0078D4" opacity="0.02"/>

  <!-- Azure logo mark (simplified) -->
  <g transform="translate(60, 28) scale(0.55)" opacity="0.9">
    <path d="M47.7 4.5L24.3 60.1 0 60.1 16.6 19.7z" fill="#0078D4"/>
    <path d="M52.3 60.1L18.4 60.1 41.2 42.7 30.8 18.2z" fill="#0078D4"/>
    <path d="M47.7 4.5L30.8 18.2 52.3 60.1 68.1 60.1z" fill="#50e6ff" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="120" y="68" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    Azure Hybrid Continuum
  </text>
  <text x="120" y="96" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="18" font-weight="300" fill="#8ecae6" letter-spacing="2">
    COOKBOOK
  </text>

  <!-- Subtitle -->
  <text x="120" y="126" font-family="Segoe UI, -apple-system, system-ui, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="0.3">
    Best practices, patterns &amp; architectures for hybrid and sovereign cloud on Azure
  </text>

  <!-- Continuum line -->
  <line x1="120" y1="170" x2="1080" y2="170" stroke="url(#accentLine)" stroke-width="2" filter="url(#softGlow)"/>

  <!-- Continuum nodes -->
  <!-- Node 1: Public Cloud -->
  <g transform="translate(200, 170)">
    <circle r="22" fill="url(#nodeGrad1)" filter="url(#glow)" opacity="0.9"/>
    <text y="-2" font-family="Segoe UI, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">☁️</text>
    <text y="40" font-family="Segoe UI, sans-serif" font-size="11" fill="#8ecae6" text-anchor="middle" font-weight="600">PUBLIC</text>
    <text y="54" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Cloud Native</text>
  </g>

  <!-- Node 2: Hybrid Connected -->
  <g transform="translate(440, 170)">
    <circle r="22" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.9"/>
    <text y="-2" font-family="Segoe UI, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">🔗</text>
    <text y="40" font-family="Segoe UI, sans-serif" font-size="11" fill="#8ecae6" text-anchor="middle" font-weight="600">CONNECTED</text>
    <text y="54" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Azure Local</text>
  </g>

  <!-- Node 3: Sovereign -->
  <g transform="translate(680, 170)">
    <circle r="22" fill="url(#nodeGrad3)" filter="url(#glow)" opacity="0.9"/>
    <text y="-2" font-family="Segoe UI, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">🛡️</text>
    <text y="40" font-family="Segoe UI, sans-serif" font-size="11" fill="#8ecae6" text-anchor="middle" font-weight="600">SOVEREIGN</text>
    <text y="54" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Landing Zone</text>
  </g>

  <!-- Node 4: Disconnected -->
  <g transform="translate(920, 170)">
    <circle r="22" fill="url(#nodeGrad4)" filter="url(#glow)" opacity="0.9"/>
    <text y="-2" font-family="Segoe UI, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">🏢</text>
    <text y="40" font-family="Segoe UI, sans-serif" font-size="11" fill="#8ecae6" text-anchor="middle" font-weight="600">DISCONNECTED</text>
    <text y="54" font-family="Segoe UI, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Air-Gapped</text>
  </g>

  <!-- Flow arrows between nodes -->
  <g opacity="0.4">
    <path d="M225 170 L415 170" stroke="#50e6ff" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M465 170 L655 170" stroke="#50e6ff" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M705 170 L895 170" stroke="#50e6ff" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Directional arrow heads -->
  <g fill="#50e6ff" opacity="0.5">
    <polygon points="415,166 415,174 422,170"/>
    <polygon points="655,166 655,174 662,170"/>
    <polygon points="895,166 895,174 902,170"/>
  </g>

  <!-- Bottom section badges -->
  <g transform="translate(120, 268)">
    <!-- Azure Local badge -->
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="50" y="17" font-family="Segoe UI, sans-serif" font-size="10" fill="#8ecae6" text-anchor="middle">Azure Local</text>

    <!-- Azure Arc badge -->
    <rect x="115" y="0" width="90" height="26" rx="13" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="160" y="17" font-family="Segoe UI, sans-serif" font-size="10" fill="#8ecae6" text-anchor="middle">Azure Arc</text>

    <!-- SLZ badge -->
    <rect x="220" y="0" width="150" height="26" rx="13" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="295" y="17" font-family="Segoe UI, sans-serif" font-size="10" fill="#8ecae6" text-anchor="middle">Sovereign Landing Zone</text>

    <!-- Cloud Exit badge -->
    <rect x="385" y="0" width="100" height="26" rx="13" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="435" y="17" font-family="Segoe UI, sans-serif" font-size="10" fill="#8ecae6" text-anchor="middle">Cloud Exit</text>

    <!-- WAF badge -->
    <rect x="500" y="0" width="155" height="26" rx="13" fill="#0078D4" opacity="0.15" stroke="#0078D4" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="577" y="17" font-family="Segoe UI, sans-serif" font-size="10" fill="#8ecae6" text-anchor="middle">Well-Architected</text>
  </g>

  <!-- Microsoft branding subtle -->
  <text x="1070" y="300" font-family="Segoe UI, sans-serif" font-size="10" fill="#475569" text-anchor="end" opacity="0.6">
    Microsoft Azure
  </text>

  <!-- Top-right corner decoration -->
  <g transform="translate(1120, 30)" opacity="0.15">
    <circle r="3" fill="#50e6ff"/>
    <circle cx="15" r="2" fill="#0078D4"/>
    <circle cx="30" r="3" fill="#50e6ff"/>
    <circle cy="15" r="2" fill="#0078D4"/>
    <circle cx="15" cy="15" r="4" fill="#50e6ff"/>
    <circle cx="30" cy="15" r="2" fill="#0078D4"/>
    <circle cy="30" r="3" fill="#50e6ff"/>
    <circle cx="15" cy="30" r="2" fill="#0078D4"/>
    <circle cx="30" cy="30" r="3" fill="#50e6ff"/>
  </g>
</svg>
